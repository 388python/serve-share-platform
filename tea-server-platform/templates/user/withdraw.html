{% extends "components/base.html" %}

{% block title %}{{ site_name }} - 提现{% endblock title %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2>提现</h2>
        <p class="text-muted">将 LDC 余额提现到你的 LinuxDo 账户</p>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="card bg-light">
                        <div class="card-body">
                            <h6>当前 LDC 余额</h6>
                            <h4 class="text-primary">{{ user_ldc | default(value="0") }}</h4>
                        </div>
                    </div>
                </div>

                <form method="post" action="/withdraw">
                    <div class="mb-3">
                        <label for="amount" class="form-label">提现金额</label>
                        <input type="number" class="form-control" id="amount" name="amount" required min="0.01" step="0.01" placeholder="输入提现金额">
                    </div>
                    <div class="mb-3">
                        <div class="card bg-light">
                            <div class="card-body">
                                <p class="mb-1">手续费: <strong id="previewFee">0</strong> LDC</p>
                                <p class="mb-0">实际到账: <strong id="previewNet">0</strong> LDC</p>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">确认提现</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}

{% block scripts %}
<script>
document.getElementById('amount').addEventListener('input', function() {
    var amount = parseFloat(this.value) || 0;
    var feeRate = 0;
    var fee = amount * feeRate;
    var net = amount - fee;
    document.getElementById('previewFee').textContent = fee.toFixed(2);
    document.getElementById('previewNet').textContent = net.toFixed(2);
});
</script>
{% endblock scripts %}
