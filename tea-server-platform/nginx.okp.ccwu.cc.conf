# ============================================
#  Nginx 配置 — okp.ccwu.cc
#  放置路径: /etc/nginx/sites-available/okp.ccwu.cc
#  启用命令: ln -s /etc/nginx/sites-available/okp.ccwu.cc /etc/nginx/sites-enabled/
# ============================================

# ---- HTTP 80 端口 (重定向到 HTTPS) ----
server {
    listen 80;
    server_name okp.ccwu.cc;

    # 强制重定向到 HTTPS
    return 301 https://okp.ccwu.cc$request_uri;
}

# ---- HTTPS 443 端口 ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name okp.ccwu.cc;

    # ---- SSL 证书 (Let's Encrypt / Certbot) ----
    # 生成证书: certbot --nginx -d okp.ccwu.cc
    ssl_certificate /etc/letsencrypt/live/okp.ccwu.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/okp.ccwu.cc/privkey.pem;

    # ---- SSL 安全配置 ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (强制 HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- 安全头 ----
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ---- 反向代理到 Rust 应用 ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # WebSocket 支持（供后台任务通信）
        proxy_http_version 1.1;
    }

    # ---- 静态文件缓存 ----
    location /static/ {
        proxy_pass http://127.0.0.1:3000/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ---- 访问日志 ----
    access_log /var/log/nginx/okp.ccwu.cc.access.log;
    error_log /var/log/nginx/okp.ccwu.cc.error.log;
}
